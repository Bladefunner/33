<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLADEFUNNER - 沉浸式语言学习</title>
<style>
:root {
    --bg-color: #f5f5f7;
    --text-main: #1d1d1f;
    --text-muted: #86868b;
    --apple-blue: #0066cc;
    --nav-bg: rgba(255, 255, 255, 0.8);
    --card-bg: #ffffff;
    --border-radius: 20px;
    --shadow: 0 8px 30px rgba(0,0,0,0.04);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
body { font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; background:var(--bg-color); color:var(--text-main); line-height:1.6; }
/* 导航栏 */
nav { position: fixed; top:0; width:100%; height:48px; background:var(--nav-bg); backdrop-filter: saturate(180%) blur(20px); display:flex; justify-content:center; align-items:center; border-bottom:1px solid rgba(0,0,0,0.08); z-index:1000;}
.nav-container { width:100%; max-width:1000px; display:flex; justify-content:space-between; padding:0 22px; }
.logo { font-weight:600; font-size:17px; cursor:pointer; letter-spacing:-0.02em; }
.nav-links { display:flex; gap:30px; }
.nav-links a { text-decoration:none; color:var(--text-main); font-size:12px; opacity:0.8; cursor:pointer; }
.nav-links a:hover { opacity:1; }
/* 视图切换 */
.view-section { display:none; padding-top:80px; min-height:100vh; max-width:1000px; margin:0 auto; animation: fadeIn 0.5s ease; }
.view-section.active { display:block; }
@keyframes fadeIn { from { opacity:0;} to{opacity:1;} }
/* 标题 */
.section-title { font-size:40px; font-weight:700; text-align:center; margin:40px 0; letter-spacing:-0.02em; }
/* 卡片网格 */
.grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:24px; padding:0 20px; }
.card { background: var(--card-bg); border-radius: var(--border-radius); padding:30px; box-shadow: var(--shadow); cursor:pointer; transition:0.3s; }
.card:hover { transform:translateY(-5px); box-shadow:0 12px 40px rgba(0,0,0,0.08);}
.card h3{ font-size:21px; margin-bottom:8px; }
.card p{ color:var(--text-muted); font-size:14px; }
/* 学习界面 */
.learning-layout{ display:flex; gap:24px; padding:0 20px; flex-wrap:wrap; }
.main-reader{ flex:2; min-width:350px; background:#fff; border-radius:var(--border-radius); padding:40px; box-shadow:var(--shadow);}
.sidebar{ flex:1; min-width:300px; display:flex; flex-direction:column; gap:24px; }
/* 剧本阅读区 */
.script-content{ font-size:18px; color:#333;}
.script-line{ margin-bottom:20px;}
.role-name{ font-weight:700; color:var(--apple-blue); margin-right:8px; }
/* 播放器与生词本 */
.widget{ background:#fff; border-radius:var(--border-radius); padding:24px; box-shadow:var(--shadow);}
.widget h4{ margin-bottom:16px; font-size:16px; font-weight:600; }
audio{ width:100%; margin:10px 0; }
.btn{ background:var(--apple-blue); color:#fff; border:none; padding:8px 16px; border-radius:20px; font-size:13px; cursor:pointer; margin-right:8px; margin-bottom:8px;}
.btn-secondary{ background:#f5f5f7; color:var(--apple-blue); }
/* 划词弹窗 */
#dict-popup{ position:absolute; display:none; background:#1d1d1f; color:#fff; padding:12px 16px; border-radius:12px; font-size:14px; z-index:2000; box-shadow:0 10px 30px rgba(0,0,0,0.2); width:220px;}
#dict-popup button{ width:100%; margin-top:10px; background:var(--apple-blue); border:none; color:white; border-radius:6px; padding:5px; cursor:pointer; }
/* 生词列表 */
#vocab-list{ list-style:none; margin-top:10px; }
.vocab-item{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f0f0f0; font-size:14px;}
.vocab-detail{ color:#86868b; font-size:12px; margin-left:6px;}
</style>
</head>

        </div>
    </div>
</nav>
